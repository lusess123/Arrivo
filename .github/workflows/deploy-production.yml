name: "⭐ Deploy Arrivo Production"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arrivo-production
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.4"

jobs:
  validate:
    name: Validate production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run cloudflare-typecheck
      - run: bun test packages/arrivo-fe/test
      - run: bun test apps/api/test
      - run: bun test packages/arrivo/contracts/test
      - run: bun test packages/arrivo/application/test
      - run: bun test packages/arrivo/infra/test
      - run: bun run api-build
      - run: bun run fe-build
      - run: bun run manage-build

  deploy-api:
    name: Deploy API Worker
    needs: [validate, migrate-database]
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Check Cloudflare credentials
        run: test -n "$CLOUDFLARE_API_TOKEN"
      - name: Deploy API
        run: bun run api-deploy
      - name: Verify API
        run: curl --fail --retry 5 --retry-delay 5 https://api-arrivo.zyking.xyz/api/health

  migrate-database:
    name: Migrate production database
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Check migration credentials
        run: test -n "$CLOUDFLARE_API_TOKEN" && test -n "$NEON_DATABASE_URL"
      - name: Apply schema to Neon
        working-directory: packages/arrivo/db
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: bun run db:deploy
      - name: Deploy temporary migration Worker
        working-directory: apps/api
        run: >-
          bunx wrangler deploy -c wrangler.migration.jsonc
          --var TARGET_DATABASE_URL:"$NEON_DATABASE_URL"
      - name: Copy production data to Neon
        run: |
          response=$(curl --fail --silent --show-error \
            "https://arrivo-db-migrate.zyk2003xxx.workers.dev")
          test "$(printf '%s' "$response" | jq -r '.ok')" = "true"
          printf '%s' "$response" | jq '{ok, counts}'
      - name: Point Hyperdrive to Neon
        working-directory: apps/api
        run: >-
          bunx wrangler hyperdrive update eb159950fe53418fb43d07d45dd9f8bb
          --connection-string="$NEON_DATABASE_URL"
      - name: Delete temporary migration Worker
        if: always()
        working-directory: apps/api
        run: bunx wrangler delete --name arrivo-db-migrate --force

  deploy-frontend:
    name: Deploy user frontend
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Check Cloudflare credentials
        run: test -n "$CLOUDFLARE_API_TOKEN"
      - run: bun run fe-build
      - name: Deploy user frontend
        run: bun run fe-deploy
      - name: Verify user frontend
        run: curl --fail --retry 5 --retry-delay 5 https://arrivo.zyking.xyz

  deploy-manage:
    name: Deploy management frontend
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Check Cloudflare credentials
        run: test -n "$CLOUDFLARE_API_TOKEN"
      - run: bun run manage-build
      - name: Deploy management frontend
        run: bun run manage-deploy
      - name: Verify management frontend
        run: curl --fail --retry 5 --retry-delay 5 https://manage-arrivo.zyking.xyz
