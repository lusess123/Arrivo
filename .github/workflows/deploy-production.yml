name: "⭐ Deploy Arrivo Production"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arrivo-production
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.4"

jobs:
  validate:
    name: Validate production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run cloudflare-typecheck
      - run: bun test packages/arrivo-fe/test
      - run: bun test apps/api/test
      - run: bun test packages/arrivo/contracts/test
      - run: bun test packages/arrivo/application/test
      - run: bun test packages/arrivo/infra/test
      - run: bun run api-build
      - run: bun run fe-build
      - run: bun run manage-build

  deploy-api:
    name: Deploy API Worker
    needs: [validate, migrate-database]
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Check Cloudflare credentials
        run: test -n "$CLOUDFLARE_API_TOKEN"
      - name: Deploy API
        run: bun run api-deploy
      - name: Verify API
        run: curl --fail --retry 5 --retry-delay 5 https://api-arrivo.zyking.xyz/api/health

  migrate-database:
    name: Migrate production database
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      MIGRATION_TOKEN: ${{ secrets.MIGRATION_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Check migration credentials
        run: test -n "$CLOUDFLARE_API_TOKEN" && test -n "$MIGRATION_TOKEN"
      - name: Deploy temporary migration Worker
        working-directory: apps/api
        run: bunx wrangler deploy -c wrangler.migration.jsonc --var MIGRATION_TOKEN:"$MIGRATION_TOKEN"
      - name: Apply database migration through Hyperdrive
        run: |
          subdomain=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/f04aaf2faa3d0eef049f6fdbc0af0c37/workers/subdomain" \
            | jq -r '.result.subdomain')
          test -n "$subdomain" && test "$subdomain" != "null"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $MIGRATION_TOKEN" \
            "https://arrivo-db-migrate.$subdomain.workers.dev"
      - name: Delete temporary migration Worker
        if: always()
        working-directory: apps/api
        run: bunx wrangler delete --name arrivo-db-migrate --force

  deploy-frontend:
    name: Deploy user frontend
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Check Cloudflare credentials
        run: test -n "$CLOUDFLARE_API_TOKEN"
      - run: bun run fe-build
      - name: Deploy user frontend
        run: bun run fe-deploy
      - name: Verify user frontend
        run: curl --fail --retry 5 --retry-delay 5 https://arrivo.zyking.xyz

  deploy-manage:
    name: Deploy management frontend
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Check Cloudflare credentials
        run: test -n "$CLOUDFLARE_API_TOKEN"
      - run: bun run manage-build
      - name: Deploy management frontend
        run: bun run manage-deploy
      - name: Verify management frontend
        run: curl --fail --retry 5 --retry-delay 5 https://manage-arrivo.zyking.xyz
